<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transduction Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="controls" aria-label="Transduction parameters">
        <section class="control-group">
          <h2>Cavity Parameters</h2>
          <div class="field-grid" id="cavity-fields"></div>
        </section>

        <section class="control-group">
          <h2>Optical Single-Atom g</h2>
          <label class="select-row">
            <span>Source</span>
            <select id="gopt-source">
              <option value="manual" selected>Manual gopt</option>
              <option value="mode_volume">Calculate from mode volume</option>
            </select>
          </label>
        </section>

        <section class="control-group">
          <h2>Atom Parameters</h2>
          <div class="field-grid" id="atom-fields"></div>
        </section>

        <section class="control-group">
          <h2>Beam Parameters</h2>
          <div class="field-grid" id="beam-fields"></div>
        </section>

        <section class="control-group">
          <h2>Efficiency Function</h2>
          <label class="select-row">
            <span>Mode</span>
            <select id="efficiency-function">
              <option value="OtoM" selected>Optical to Microwave</option>
              <option value="MtoO">Microwave to Optical</option>
              <option value="func_2">Function from Kumar2023</option>
            </select>
          </label>
        </section>

        <section class="control-group">
          <h2>Files</h2>
          <div class="button-grid">
            <button type="button" id="export-csv">Export Parameters CSV</button>
            <button type="button" id="import-csv">Import Parameters CSV</button>
            <button type="button" id="save-graph">Save Graph With Textbox</button>
            <button type="button" id="save-graph-clean">Save Graph Without Textbox</button>
            <button type="button" id="save-all">Save All</button>
          </div>
          <input id="csv-file" type="file" accept=".csv,text/csv" hidden />
        </section>
      </aside>

      <section class="plot-panel" aria-label="Efficiency plot">
        <div class="plot-header">
          <div class="title-row">
            <h1>Transduction Calculator</h1>
            <a
              class="physics-link"
              href="https://www.notion.so/Efficiency-Function-Derivation-36eee2c01b6180728fb7e5bccfe16d82"
              target="_blank"
              rel="noopener noreferrer"
            >
              Checkout the Physics Here!
            </a>
            <p id="plot-subtitle">Optical to Microwave</p>
          </div>
          <div class="metrics" aria-live="polite">
            <div>
              <span>Max Efficiency</span>
              <strong id="max-efficiency">-</strong>
            </div>
            <div>
              <span>Bandwidth</span>
              <strong id="bandwidth">-</strong>
            </div>
            <div>
              <span>OmegaB</span>
              <strong id="omega-b">-</strong>
            </div>
            <div>
              <span>OmegaUV</span>
              <strong id="omega-uv">-</strong>
            </div>
            <div>
              <span>Single-Atom g / 2pi</span>
              <strong id="single-atom-g">-</strong>
            </div>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="plot" aria-label="Conversion efficiency plot"></canvas>
        </div>
        <p id="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
